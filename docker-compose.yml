services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AZUREPILOT_MODE=demo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./ui:/app
    command: python -m http.server 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
